# Bug Fix Workflow
# Systematic diagnosis, fix, and verification

name: bug-fix
description: Root cause analysis to verified fix
trigger: Bug report or unexpected behavior

steps:
  - command: /diagnose
    purpose: Find root cause with evidence
    on_result:
      root_cause_found: proceed
      insufficient_evidence: escalate
      execution_error: escalate

  - command: /generate-tests
    purpose: Write regression test for the bug
    on_result:
      success: proceed
      validation_failed:
        - command: /diagnose
          purpose: Investigate test infrastructure issue
      blocked: escalate
      execution_error: escalate

  - command: /implement
    purpose: Apply the fix
    on_result:
      success: proceed
      validation_failed:
        - command: /diagnose
          purpose: Re-investigate if fix fails validation
      build_failed:
        - command: /diagnose
          purpose: Re-investigate if build breaks
      blocked: escalate
      execution_error: escalate

  - command: /audit-code
    purpose: Verify fix quality
    on_result:
      clean: proceed
      issues_found:
        - command: /implement
          purpose: Fix quality issues found in the fix
      execution_error: escalate

  - command: /parallel-review
    purpose: Independent verification
    optional: true
    on_result:
      approved: done
      changes_requested:
        - command: /implement
          purpose: Address review findings
      blocked: done  # review optional — if blocked, still acceptable
