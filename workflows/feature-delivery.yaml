# Feature Delivery Workflow
# Full cycle from audit to documentation for new features or enhancements

name: feature-delivery
description: End-to-end feature implementation with quality gates
trigger: New feature request or enhancement

steps:
  - command: /audit-project
    purpose: Understand current architecture before changes
    optional: true
    on_result:
      clean: proceed
      issues_found: proceed  # note issues but continue — feature may not touch them
      execution_error: escalate

  - command: /refactor-plan
    purpose: Plan changes if structural work needed
    optional: true
    on_result:
      plan_ready: proceed
      needs_input: escalate
      execution_error: escalate

  - command: /generate-tests
    purpose: Write tests first (TDD when infrastructure exists)
    on_result:
      success: proceed
      validation_failed:
        - command: /diagnose
          purpose: Investigate test infrastructure failure
      blocked: escalate

  - command: /implement
    purpose: Execute the feature implementation
    on_result:
      success: proceed
      validation_failed:
        - command: /diagnose
          purpose: Investigate validation failure
      build_failed:
        - command: /diagnose
          purpose: Investigate build failure
      blocked: escalate

  - command: /parallel-review
    purpose: Independent quality gate
    on_result:
      approved: proceed
      changes_requested:
        - command: /implement
          purpose: Fix review findings
      blocked: escalate

  - command: /generate-docs
    purpose: Document the new feature
    on_result:
      success: proceed
      blocked: escalate

  - command: /reflect
    purpose: Weekly retrospective
    optional: true
    on_result:
      insights_found: done
      no_patterns: done
